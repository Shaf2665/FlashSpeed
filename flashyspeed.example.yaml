server:
  port: 8080
  data_dir: /var/lib/flashyspeed

tls:
  # self-signed | auto (Let's Encrypt) | manual (paths below)
  mode: self-signed
  # auto: public hostname and ACME contact (required when mode=auto)
  domain: ""
  email: ""
  # manual: PEM paths (required when mode=manual)
  cert_file: ""
  key_file: ""

storage:
  auto_detect_drives: true
  manual_paths: []

admin:
  create_default_admin: true
